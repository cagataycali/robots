name: Bug Report
description: Report a bug in Strands Robots
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        from strands_robots import Robot

        robot = Robot("so100")
        # ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or tracebacks.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running?
      options:
        - Simulation (MuJoCo)
        - Simulation (Isaac Sim)
        - Simulation (Newton)
        - Real Hardware
        - Both Sim and Real
    validations:
      required: true

  - type: input
    id: robot
    attributes:
      label: Robot
      description: Which robot? (e.g. so100, unitree_g1, aloha)
      placeholder: so100

  - type: input
    id: policy
    attributes:
      label: Policy Provider
      description: Which policy? (e.g. groot, lerobot_local, mock)
      placeholder: mock

  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: "3.12"
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: strands-robots Version
      description: Output of `pip show strands-robots | grep Version`
      placeholder: "0.1.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (aarch64 / Jetson)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other info — hardware details, Jetson platform, logs, screenshots.
