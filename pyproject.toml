[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "strands-robots"
dynamic = ["version"]
description = "AI-powered robot control, simulation, and training for Strands Agents — integrates with MuJoCo, Isaac Sim, Newton, and many more"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [
    {name = "AWS", email = "opensource@amazon.com"},
]
keywords = [
    "robots", "agents", "lerobot", "strands", "sdk",
    "mujoco", "simulation", "reinforcement-learning",
    "groot", "nvidia", "isaac-sim", "vla",
    "robot-learning", "imitation-learning",
    "teleoperation", "manipulation",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "strands-agents>=1.0.0",
    "numpy>=1.21.0",
    "opencv-python-headless>=4.5.0",
    "Pillow>=8.0.0",
    "msgpack>=1.0.0",
    "pyzmq>=27.0.0",
]

[project.optional-dependencies]
lerobot = [
    "torch>=2.0.0",
    "lerobot>=0.4.0",
    "lerobot[feetech]",
]
mujoco = [
    "mujoco>=3.0.0",
    "Pillow>=8.0.0",
]
isaac = [
    # Isaac Sim/Lab are installed separately (requires NVIDIA GPU + Isaac Sim runtime)
    # See docs/isaac.md for EC2 setup instructions
    "h5py>=3.0",
    "mujoco>=3.0.0",
    "usd-core>=24.0",
]
newton = [
    "warp-lang>=1.11.0",
    "trimesh",
    "mujoco>=3.5.0",
    "numpy>=1.24.0",
]
cosmos-transfer = [
    "torch>=2.1.0",
    "torchvision",
    "pydantic>=2.0",
]
cosmos-predict = [
    "torch>=2.1.0",
    "torchvision",
    "omegaconf>=2.3.0",
    "loguru>=0.7.0",
    "tyro>=1.0.0",
    "h5py>=3.0",
    "einops>=0.6.0",
    "filelock>=3.0",
]
marble = [
    "requests>=2.28.0",
    "trimesh>=4.0.0",
    "plyfile>=1.0.0",
]
robometer = [
    "torch>=2.0.0",
    "transformers>=4.40.0",
    "scipy>=1.10.0",
]
zenoh = [
    "eclipse-zenoh>=1.0.0",
]
policies = [
    "transformers>=4.40.0",
    "sentencepiece>=0.1.99",
    "num2words>=0.5.13",
    "scipy>=1.10.0",
    "imageio>=2.30.0",
    "imageio-ffmpeg>=0.4.0",
    "av>=10.0.0",
]
leisaac = [
    "leisaac[isaaclab]",
    "lerobot>=0.4.0",
]
all = [
    "strands-robots[lerobot]",
    "strands-robots[mujoco]",
    "strands-robots[policies]",
    "strands-robots[newton]",
    "strands-robots[cosmos-transfer]",
    "strands-robots[cosmos-predict]",
    "strands-robots[marble]",
    "strands-robots[robometer]",
    "strands-robots[zenoh]",
    "strands-robots[leisaac]",
]
dev = [
    "pytest>=6.0",
    "pytest-cov",
    "black",
    "isort",
    "flake8",
    "mypy",
]

[project.urls]
Homepage = "https://github.com/strands-labs/robots"
Documentation = "https://github.com/strands-labs/robots#readme"
Repository = "https://github.com/strands-labs/robots.git"
Issues = "https://github.com/strands-labs/robots/issues"
Changelog = "https://github.com/strands-labs/robots/releases"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["strands_robots"]

[tool.hatch.envs.default]
dependencies = [
    "pytest>=6.0",
    "pytest-cov",
    "black",
    "isort",
    "flake8",
    "mypy",
    "Pillow>=8.0.0",
    "requests>=2.28.0",
    "msgpack>=1.0.0",
]

[tool.hatch.envs.default.scripts]
test = "pytest {args:tests}"
lint = ["black --check strands_robots tests", "isort --check-only strands_robots tests", "flake8 strands_robots tests"]
format = ["black strands_robots tests", "isort strands_robots tests"]

[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3

[tool.pytest.ini_options]
