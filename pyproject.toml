[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "strands-robots"
dynamic = ["version"]
description = "Robot control, simulation, and training for Strands Agents"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "Apache-2.0"}
authors = [
    {name = "AWS", email = "opensource@amazon.com"},
]
keywords = [
    "robots", "agents", "lerobot", "strands", "sdk",
    "mujoco", "simulation", "reinforcement-learning",
    "groot", "nvidia", "isaac-sim", "vla",
    "robot-learning", "imitation-learning",
    "teleoperation", "manipulation",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "strands-agents>=1.0.0",
    "numpy>=1.21.0",
    "opencv-python-headless>=4.5.0",
    "Pillow>=8.0.0",
    "msgpack>=1.0.0",
    "pyzmq>=27.0.0",
]

[project.optional-dependencies]
ml = [
    "torch>=2.0.0",
    "lerobot>=0.5.0",
]
hardware = [
    "lerobot[feetech]",
]
sim = [
    "mujoco>=3.0.0",
    "Pillow>=8.0.0",
]
isaac = [
    # Isaac Sim/Lab are installed separately (requires NVIDIA GPU + Isaac Sim runtime)
    # See docs/isaac.md for EC2 setup instructions
    # pip install isaaclab isaaclab_assets isaaclab_tasks (from Isaac Lab source)
    "h5py>=3.0",
    "mujoco>=3.0.0",
    "usd-core>=24.0",  # OpenUSD (pxr) for MJCF→USD asset conversion
]
newton = [
    "warp-lang>=1.11.0",
    "trimesh",
    "mujoco>=3.5.0",
    "numpy>=1.24.0",
    # newton + mujoco-warp installed from source (requires NVIDIA GPU + CUDA)
]
cosmos-transfer = [
    "torch>=2.1.0",
    "torchvision",
    "pydantic>=2.0",
    # cosmos-transfer2 installed from source: github.com/nvidia-cosmos/cosmos-transfer2.5
]
cosmos-predict = [
    "torch>=2.1.0",
    "torchvision",
    "omegaconf>=2.3.0",
    "loguru>=0.7.0",
    "tyro>=1.0.0",
    "h5py>=3.0",
    "einops>=0.6.0",
    "filelock>=3.0",
    # cosmos-predict2 installed from source: github.com/nvidia-cosmos/cosmos-predict2.5
    # Also requires: transformer-engine[pytorch], flash-attn (build from source with CUDA toolkit)
]
marble = [
    "requests>=2.28.0",
    "trimesh>=4.0.0",
    "plyfile>=1.0.0",
    # Optional: usd-core>=24.0 for USD scene composition (heavy dep)
    # Optional: open3d>=0.18.0 for 3D visualization
    # 3DGrut installed from source: github.com/nv-tlabs/3dgrut (PLY→USDZ Gaussian splat conversion)
    # Marble API access: marble.worldlabs.ai (requires API key — set WLT_API_KEY)
]
zenoh = [
    "eclipse-zenoh>=1.0.0",
]
vla = [
    "transformers>=5.0.0",
    "sentencepiece>=0.1.99",
    "num2words>=0.5.13",
    "scipy>=1.10.0",
    "imageio>=2.30.0",
    "imageio-ffmpeg>=0.4.0",
    "av>=10.0.0",
]
leisaac = [
    "leisaac[isaaclab]",
    "lerobot>=0.5.0",
]
all = [
    "strands-robots[ml]",
    "strands-robots[hardware]",
    "strands-robots[sim]",
    "strands-robots[vla]",
    "strands-robots[newton]",
    "strands-robots[cosmos-transfer]",
    "strands-robots[cosmos-predict]",
    "strands-robots[marble]",
    "strands-robots[zenoh]",
]
dev = [
    "pytest>=6.0",
    "pytest-cov",
    "black",
    "isort",
    "ruff",
    "mypy",
    "mkdocs-material",
    "pymdown-extensions",
]
docs = [
    "mkdocs-material>=9.0",
    "pymdown-extensions>=10.0",
    "mkdocstrings[python]",
]

[project.urls]
Homepage = "https://github.com/strands-labs/robots"
Documentation = "https://strands-labs.github.io/robots/"
Repository = "https://github.com/strands-labs/robots.git"
Issues = "https://github.com/strands-labs/robots/issues"
Changelog = "https://github.com/strands-labs/robots/releases"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["strands_robots"]

[tool.hatch.envs.default]
dependencies = [
    "pytest>=6.0",
    "pytest-cov",
    "ruff",
    "Pillow>=8.0.0",
    "requests>=2.28.0",
    "msgpack>=1.0.0",
]

[tool.hatch.envs.default.scripts]
test = "pytest {args:tests}"
lint = "ruff check strands_robots tests"
format = "ruff format strands_robots tests"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=strands_robots --cov-report=term-missing"
